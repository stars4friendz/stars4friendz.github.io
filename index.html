<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RailBrake PL</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<!-- FORMULARZ -->

<div id="formularz">




        

        <p>Kalkulator Próby Hamulca KD</p>

    </div>



    <div class="card">


        <label>Pojazd</label>

        <select id="pojazd"></select>



        <label>Mo [t]</label>

        <input 
            type="number"
            id="mo"
        >



        <label>Mhr [t]</label>

        <input 
            type="number"
            id="mhr"
        >



        <label>Ciśnienie PG hamulca [MPa]</label>

        <input
            type="number"
            step="0.01"
            id="pg"
        >



        <label>Ciśnienie PG sprężonego powietrza [MPa]</label>

        <input
            type="number"
            step="0.01"
            id="spr"
        >



        <label>Pw [%]</label>

        <input
            type="number"
            id="pw"
            placeholder="np. 90"
        >



        <button id="obliczBtn">

            🧮 OBLICZ

        </button>


    </div>


</div>





<!-- WYNIKI -->


<div id="wyniki" style="display:none;">


    <div class="logo">

        🚆

        <h1>Wyniki</h1>

    </div>




    <div class="card">



        <div class="wynik">

            <span>Mos</span>

            <strong id="mos"></strong>

        </div>



        <div class="wynik">

            <span>Mo</span>

            <strong id="moW"></strong>

        </div>



        <div class="wynik">

            <span>Mhw</span>

            <strong id="mhw"></strong> <span>↑</span>

        </div>



     




        <div class="wynik">

            <span>Mhr</span>

            <strong id="mhrW"></strong> <span>↓</span>

        </div>



      





        <div class="wynik">

            <span>Pw</span>

            <strong id="pwW"></strong> <span>↑</span>

        </div>



    




        <div class="wynik">

            <span>PR</span>

            <strong id="pr"></strong> <span>↓</span>

        </div>



      





        <div class="wynik">

            <span>PG hamulca</span>

            <strong id="pgW"></strong>

        </div>




        <div class="wynik">

            <span>PG spr. pow.</span>

            <strong id="sprW"></strong>

        </div>



    </div>



    <div id="status"></div>



    <button id="powrotBtn">

        ← Nowe obliczenie

    </button>



</div>



</div>



<script src="script.js"></script>


</body>

</html>
